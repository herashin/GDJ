<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <link  rel="stylesheet"   href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <title>오늘의 날씨</title>
    <style>
        *{margin:0; padding:0;}
        a{text-decoration: none;
            color: #000000;
        }
        body{
            background-color: #FFF3E0;
        }

        li{list-style: none;}

        .wrapper{
            background-color: #fff;
            border:1px solid #000;
            width:70%; 
            min-width:360px;
            margin:30px auto;
        }

        .header{
            width:100%;


        }


        /*  상단 광고배너 영역 */
        .top_banner_area{
            border: 1px solid #000;
            text-align: center;
        }

        .container{}

/* 날씨 그림영역 &&&&  날짜 시간 영역 시작 */
        .top_weather_and_temperature{
            display: flex;
            margin:5px 0;
            justify-content: space-between;
            height:200px;

        }
        .top_weather_area{
          
            border: 1px solid #000;
            text-align: center;
        }

        .temperature_and_weatherZone{

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .weatherZone{
            border: 1px solid #000;
        }
        
        .temperature{
            margin-right:40px;

        }
/* 날씨 그림영역 &&&&  날짜 시간 영역  끝*/


/*  오늘의 날씨 한줄 영역 시작  */
        .weather_text_area{
            border: 1px solid #000;
            margin:0 0 50px 0;
        }
/*  오늘의 날씨 한줄 영역 끝 */
        .character_container{

          /*  width:70%; */
        /*    margin:0 auto;*/

         /*   overflow:hidden;*/


        }
        /*
        .character_container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        */
        .character_boxs{
            outline: 1px solid #ddd;
        /*    width:30%;*/
            height:300px;

        }


        .mid_banner{
            margin:10px 0;
            border: 1px solid #000;
            text-align: center;
        }

        .week_weather_area{
            border: 1px #000;

        }

        .week_weather_days{
            border: 1px solid #FFC9C2;
            background-color: #FFF7F6;
            padding:2% 0;
        }




        .footer{
            border: 1px solid #000;
            margin:5% 0 0;
        
        }

    </style>
</head>
<body>
    
    <div class="wrapper">

        <header class="header">

            <div class="top_banner_area">
                광고배너
            </div>

        </header>


        <section class="container">
            <div class="top_weather_and_temperature">
                <div class="top_weather_area">
                    날씨 그림 영역

                </div>


                <div class="temperature_and_weatherZone">
                   <!-- 
                    <div class="temperature">
                        온도

                    </div>

                    <div class="weatherZone">
                        지역

                    </div> -->
                    <div class="weatherZone">
                        날짜 & 시간
                    </div>
                    
                </div>
            </div>
            <div class="weather_text_area">
                <p>오늘 날씨는 구름이 많아요. 다소 쌀쌀할 수 있으므로.... </p>

            </div>


    

      

                <!-- Slider main container -->
                <div class="swiper character_container mySwiper">
                    <!-- Additional required wrapper -->
                    <div class="swiper-wrapper ">
                    <!-- Slides -->
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트1</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트2</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트3</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트4</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트5</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트6</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트7</div>
                        <div class="swiper-slide character_boxs"> 캐릭터 일러스트8</div>
                    
                    </div>
                    <!-- If we need pagination -->
                    <div class="swiper-pagination"></div>
                
                    <!-- If we need navigation buttons -->
                    <!-- <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                 -->
                    <!-- If we need scrollbar -->
                    <div class="swiper-scrollbar"></div>
                </div>    
                
                <div class="mid_banner">
                    중단 광고배너

                </div>
        </section>


        <section>
            <div class="week_weather_area">

                <div class="week_weather_today  week_weather_days">
                    요일별 날씨안내, 날씨아이콘, 온도 
                </div>
                <div class="week_weather_tomorrow  week_weather_days">
                    내일
                </div>

                <div class="week_weather_day_plus1  week_weather_days">
                    section13
                </div>

                <div class="week_weather_day_plus2  week_weather_days">
                    section14
                </div>
            </div>


        </section>










        <footer class="footer">

            <div class="footer_banner_area">
                하단 광고배너

            </div>
        </footer>

    </div>

    <script>

            
      
var swiper = new Swiper(".mySwiper", {
        slidesPerView: 2,
        spaceBetween: 5,
        centeredSlides: true,
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
    
    
    </script>
</body>
</html>
